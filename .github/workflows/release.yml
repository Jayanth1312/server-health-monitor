name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true

  build-windows:
    name: Build Windows
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build Release
        run: cargo build --release

      - name: Rename Windows EXE
        shell: pwsh
        run: |
          Copy-Item target\release\todo.exe todo-windows-x64.exe

      - name: Create checksum
        shell: pwsh
        run: |
          (Get-FileHash todo-windows-x64.exe -Algorithm SHA256).Hash | Out-File -FilePath todo-windows-x64.exe.sha256 -Encoding ASCII

      - name: Upload Windows Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./todo-windows-x64.exe
            ./todo-windows-x64.exe.sha256

  build-linux:
    name: Build Linux
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build Release
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/todo

      - name: Install cargo-deb
        run: cargo install cargo-deb

      - name: Update Cargo.toml for deb package
        run: |
          cat >> Cargo.toml << 'EOF'

          [package.metadata.deb]
          maintainer = "Todo App <todo@example.com>"
          copyright = "2024, Todo App Team"
          license-file = ["LICENSE", "4"]
          extended-description = """\
          A fast, lightweight, and intuitive terminal-based todo application built with Rust.
          Features include:
          - Project-based task organization
          - Eisenhower Matrix priorities (4 quadrants)
          - Due dates with visual calendar picker
          - Fuzzy search across all tasks
          - Automatic completion tracking
          - Beautiful TUI with vim-style navigation
          """
          depends = "$auto"
          section = "utility"
          priority = "optional"
          assets = [
              ["target/release/todo", "usr/bin/", "755"],
              ["README.md", "usr/share/doc/todo/", "644"],
          ]
          EOF

      - name: Create LICENSE file if not exists
        run: |
          if [ ! -f LICENSE ]; then
            echo "MIT License" > LICENSE
            echo "" >> LICENSE
            echo "Copyright (c) $(date +%Y)" >> LICENSE
          fi

      - name: Build DEB package
        run: cargo deb

      - name: Rename Linux Binary
        run: cp ./target/release/todo ./todo-linux-x64

      - name: Create checksums
        run: |
          sha256sum ./todo-linux-x64 > ./todo-linux-x64.sha256
          sha256sum ./target/debian/*.deb > ./todo-linux.deb.sha256

      - name: Upload Linux Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./todo-linux-x64
            ./todo-linux-x64.sha256
            ./target/debian/*.deb
            ./todo-linux.deb.sha256

  build-macos:
    name: Build macOS
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build Release
        run: cargo build --release

      - name: Strip binary
        run: strip target/release/todo

      - name: Create macOS App Bundle and DMG
        run: |
          chmod +x build-macos.sh
          ./build-macos.sh

      - name: Rename macOS Binary
        run: cp ./target/release/todo ./todo-macos-x64

      - name: Create checksums
        run: |
          shasum -a 256 ./todo-macos-x64 > ./todo-macos-x64.sha256
          shasum -a 256 ./target/*.dmg > ./todo-macos.dmg.sha256

      - name: Upload macOS Assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./todo-macos-x64
            ./todo-macos-x64.sha256
            ./target/*.dmg
            ./todo-macos.dmg.sha256
